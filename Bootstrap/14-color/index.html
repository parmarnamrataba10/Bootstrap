<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>color</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1 class="text-center">color</h1>

           <div class="container">
            <p class="bg-primary">primary</p>
             <p class="bg-primary-subtle">primary</p>
              <p class="bg-secondary">secondary</p>
              <p class="bg-secondary-subtle">secondary</p>
              <p class="bg-info">info</p>
              <p class="bg-info-subtle">info</p>
              <p class="bg-warning">warning</p>
               <p class="bg-warning-subtle">warning</p>
                <p class="bg-danger">danger</p>
                 <p class="bg-danger-subtle">danger</p>
                  <p class="bg-success">success</p>
                  <p class="bg-success-subtle">success</p>
                  <p class="bg-dark text-white">dark</p>
                  <p class="bg-dark-subtle">dark</p>
           </div>
     
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
