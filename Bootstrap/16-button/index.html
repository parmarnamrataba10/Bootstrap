<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Button</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>
    <h1 class="text-center">Button</h1>
    <div class="container">
        <div class="row">
            <div class="col">
                <button class="btn btn-primary">primary</button>
                <button class="btn btn-secondary">secondary</button>
                <button class="btn btn-warning">warning</button>
                <button class="btn btn-danger">danger</button>
                <button class="btn btn-info">info</button>
                <button class="btn btn-success">success</button>
            </div>
            <div class="row mt-5">
                <div class="col">
                <button class="btn btn-outline-primary">primary</button>
                <button class="btn btn-outline-secondary">secondary</button>
                <button class="btn btn-outline-warning">warning</button>
                <button class="btn btn-outline-danger">danger</button>
                <button class="btn btn-outline-info">info</button>
                <button class="btn btn-outline-success">success</button>
            </div>
            <div class="row mt-5">
                <div class="col">
                    <button class="btn btn-danger btn-lg">danger</button>
                    <button class="btn btn-warning">warning</button>
                    <button class="btn btn-success btn-sm">success</button>
                </div>
            </div>
            <div class="row mt-5">
                <div class="col btn-group">
                   <button class="btn btn-primary ">primary</button>
                <button class="btn btn-secondary">secondary</button>
                <button class="btn btn-warning">warning</button>
                <button class="btn btn-danger">danger</button>
                <button class="btn btn-info">info</button>
                <button class="btn btn-success">success</button>
            </div>
                </div>
                <div class="row mt-5">
                    <div class="col">
                        <a href="" class="btn btn-primary">this is a link</a>
                        <a href="" class="btn btn-secondary">this is a link</a>
                        <a href="" class="btn btn-warning">this is a link</a>
                        <a href="" class="btn btn-danger">this is a link</a>
                        <a href="" class="btn btn-info">this is a link</a>
                        <a href="" class="btn btn-success">this is a link</a>
                    </div>
                </div>
                <div class="row mt-5">
                    <div class="col d-grid gap2">
                     <button class="btn btn-outline-primary">primary</button>
                <button class="btn btn-outline-secondary">secondary</button>
                <button class="btn btn-outline-warning">warning</button>

                    </div>
                </div>
                <div class="row mt-5">
                    <div class="col">
                       <div class="btn-group-vertical">
                         <button class="btn btn-primary ">primary</button>
                <button class="btn btn-secondary">secondary</button>
                       </div>
                    </div>

                </div>
            </div>
            </div>
            
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
